<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ummah News Kids 🌙</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #F5E8C7;
      color: #2C3E50;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #A8CBA8;
      padding: 20px;
      text-align: center;
      border-bottom: 4px solid #D4A373;
    }

    header h1 {
      margin: 0;
      font-size: 2em;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #555;
    }
  </style>

</head>

<body>

<header>
  <h1>🌙 Ummah News Kids</h1>
  <p>Your Weekly World News — Simple, Kind & True</p>
</header>

<div class="container">
  <div class="card">
    <h2>📰 Today's Story</h2>
    <p>Content will appear here soon...</p>
  </div>
</div>

<footer>
  <p>Made with intention 🌙</p>
</footer>

</body>
</html>
